<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1024, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { width: 1024px; height: 500px; margin: 0; overflow: hidden; }
body {
  font-family: "Pretendard", "SUIT", "Noto Sans KR", sans-serif;
  color: #102a35;
  background: linear-gradient(135deg, #f7fafb 0%, #e8f2f4 100%);
}
.page { position: relative; width: 100%; height: 100%; padding: 54px 64px; }
.brand { display: flex; align-items: center; gap: 13px; }
.brand img { width: 54px; height: 54px; border-radius: 15px; }
.brand span { font-size: 31px; font-weight: 850; letter-spacing: -.04em; }
.eyebrow { margin-top: 38px; color: #146b7d; font-size: 18px; font-weight: 800; }
h1 { margin: 10px 0 0; font-size: 55px; line-height: 1.08; letter-spacing: -.055em; }
.tagline { width: 560px; margin: 20px 0 0; color: #60737b; font-size: 24px; line-height: 1.35; font-weight: 650; }
.note {
  position: absolute; right: 62px; top: 48px; width: 300px; height: 404px;
  padding: 27px; background: #fff; border: 1px solid #d8e2e6; border-radius: 28px;
  box-shadow: 0 24px 60px rgba(16, 42, 53, .13); transform: rotate(2deg);
}
.photo { height: 136px; border-radius: 18px; background: #e0f0f3; display: grid; place-items: center; }
.photo svg { width: 70px; height: 70px; }
.field { margin-top: 18px; font-size: 13px; color: #60737b; font-weight: 750; }
.value { margin-top: 4px; font-size: 23px; color: #102a35; font-weight: 850; }
.tags { display: flex; gap: 7px; margin-top: 19px; }
.tag { padding: 8px 11px; border-radius: 8px; background: #edf3f5; color: #445c65; font-size: 13px; font-weight: 750; }
.offline { position: absolute; left: 64px; bottom: 42px; color: #60737b; font-size: 15px; font-weight: 700; }
.dot { display: inline-block; width: 9px; height: 9px; margin-right: 8px; border-radius: 50%; background: #146b7d; }
</style>
</head>
<body>
<main class="page">
  <div class="brand"><img src="../../icon.svg" alt=""><span>FairNote</span></div>
  <div class="eyebrow">현장에서 바로 쓰는 박람회 노트</div>
  <h1>사진부터 기록하고<br>돌아와서 판단하세요</h1>
  <p class="tagline">가격 · 배송 · 포장 · 명함을 한곳에</p>
  <div class="offline"><span class="dot"></span>로그인 없이 시작 · 오프라인 저장</div>
  <section class="note" aria-label="상품 기록 예시">
    <div class="photo">
      <svg viewBox="0 0 80 80" fill="none" aria-hidden="true">
        <rect x="13" y="15" width="54" height="48" rx="10" stroke="#146b7d" stroke-width="5"/>
        <circle cx="52" cy="30" r="6" fill="#146b7d"/>
        <path d="M20 55l15-16 11 11 7-7 9 12" stroke="#146b7d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="field">A-101 · 관심 상품</div>
    <div class="value">무선 디스플레이 램프</div>
    <div class="field">가격</div>
    <div class="value">$12.50 · FOB</div>
    <div class="tags"><span class="tag">배송 30일</span><span class="tag">12개 / 박스</span></div>
  </section>
</main>
</body>
</html>
