<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1024, initial-scale=1">
<style>
* { box-sizing: border-box; }
html, body { width: 1024px; height: 500px; margin: 0; overflow: hidden; }
body {
  font-family: Inter, "Segoe UI", Arial, sans-serif;
  color: #201a17;
  background:
    radial-gradient(circle at 83% 15%, rgba(207, 69, 47, .18), transparent 28%),
    linear-gradient(135deg, #fffdf7 0%, #f4eadb 100%);
}
.page { position: relative; width: 100%; height: 100%; padding: 62px 72px; }
.eyebrow { color: #b43e2c; font-size: 18px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
h1 { margin: 16px 0 8px; font-size: 74px; line-height: .95; letter-spacing: -.045em; }
.tagline { width: 540px; margin: 24px 0 0; color: #5a4d45; font-size: 27px; line-height: 1.3; font-weight: 600; }
.note {
  position: absolute; right: 76px; top: 58px; width: 292px; height: 384px;
  padding: 28px; background: #fffefb; border: 1px solid #ded0bd; border-radius: 24px;
  box-shadow: 0 24px 60px rgba(69, 47, 34, .17); transform: rotate(3deg);
}
.note:before { content: ""; position: absolute; left: 0; top: 76px; right: 0; height: 1px; background: #eadfce; box-shadow: 0 54px #eadfce, 0 108px #eadfce, 0 162px #eadfce, 0 216px #eadfce; }
.mark { width: 66px; height: 66px; display: grid; place-items: center; border-radius: 18px; color: white; background: #bd4632; font-size: 32px; font-weight: 900; }
.field { position: relative; margin-top: 18px; font-size: 14px; color: #9a897d; font-weight: 700; }
.value { position: relative; margin-top: 4px; font-size: 21px; color: #302620; font-weight: 800; }
.pill { position: absolute; bottom: 25px; left: 28px; padding: 9px 14px; border-radius: 999px; background: #f7ddd6; color: #a73322; font-size: 14px; font-weight: 800; }
.offline { position: absolute; left: 74px; bottom: 62px; color: #6f6158; font-size: 16px; font-weight: 700; }
.dot { display: inline-block; width: 9px; height: 9px; margin-right: 8px; border-radius: 50%; background: #4f805d; }
</style>
</head>
<body>
<main class="page">
  <div class="eyebrow">Your trade fair field notebook</div>
  <h1>FairNote</h1>
  <p class="tagline">Capture products in the moment.<br>Review sourcing decisions with clarity.</p>
  <div class="offline"><span class="dot"></span>Works offline · No account required</div>
  <section class="note" aria-label="Sample sourcing note">
    <div class="mark">F</div>
    <div class="field">BOOTH</div>
    <div class="value">A-101</div>
    <div class="field">PRICE</div>
    <div class="value">$12.50 · FOB</div>
    <div class="field">PACKAGING</div>
    <div class="value">12 / carton</div>
    <div class="pill">Ready to review</div>
  </section>
</main>
</body>
</html>
